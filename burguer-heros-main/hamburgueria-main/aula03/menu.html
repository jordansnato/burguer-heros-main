<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style2.css" />
    <title>Menu Heros</title>
  </head>
  <body>
    <header>
      <h1>Confira nossos Heroes</h1>
      <button class="btn" type="reset">
        <a href="index.html">Voltar</a>
      </button>
    </header>

    <main>
      <section class="galeria">
        <figure>
          <img
            src="./img/hamburguer1.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Xsalada</h3>
            <p>
              150g carne, queijo cheddar, pão tradicional, tomate, alface,
              cebola
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer2.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Combo brioche</h3>
            <p>
              2 lanches cada 200g de carne, queijo cheddar, pão aveia e mel,
              salada
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer3.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Burguer Triplo</h3>
            <p>
              2 hamburguers de 150g, bacon, cheddar, maionese caseira, pepino
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer4.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Burguer bacon</h3>
            <p>
              pão tradicional carne 150g, queijo mussarela, bacon, tomate,
              alface, pepino
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer5.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Bacon Grill</h3>
            <p>150g carne, bacon, queijo, molho e salada</p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer6.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>BBQ Burger</h3>
            <p>150g Carne, bacon, molho BBQ, salada, fritas</p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/hamburguer7.jpg"
            alt="Imagem de um hamburguer"
            loading="lazy"
          />
          <figcaption>
            <h3>Duplo Smash</h3>
            <p>2x carne 100g, Bacon, cheddar, cebola</p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="./img/perfil1.jpg"
            alt="Imagem de um perfil"
            loading="lazy"
          />
          <figcaption>
            <h3>Burguer Chef</h3>
            <p>2x carne 150g, cheddar, cebola caremelizada, tomate, alface</p>
          </figcaption>
        </figure>
      </section>
    </main>

    <footer>
      <p>&copy; Menu Burguer Heroes - 2026</p>
    </footer>
  </body>
</html>
