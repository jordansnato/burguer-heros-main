<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="./CSS/style2.css">
    <title>Menu Heros</title>
</head>
<body>
    <header>
        <h1>Confira nossos Heros</h1>
    </header>

    <main>
        <section class="galeria">
           <figure>             
              <img src="./img/hamburguer1.jpg" alt="">
              <h3>Xsalada</h3>
              <figcaption>150g carne, queijo cheddar, pão tradicional, tomate, alface, cebola</figcaption>
            </figure>

            <figure>

                <img src="./img/hamburguer2.jpg" alt="">
                <h3>Combo brioche</h3>
                <figcaption>2 lanches cada 200g de carne, queijo cheddar, pão aveia e mel, salada</figcaption>
            </figure>


            <figure>
                <img src="./img/hamburguer3.jpg" alt="">
                <h3>Burguer Triplo</h3>
                <figcaption>2 hamburguers de 150g, bacon, cheddar, maionese caseira, pepino</figcaption>
            </figure>
        
            <figure>
                <img src="./img/hamburguer4.jpg" alt="">
                <h3>Burguer bacon</h2>
                <figcaption>pão tradicional carne 150g, queijo mussarela, bacon, tomate, alface, pepino </figcaption>
            </figure>

            <figure>
                <img src="./img/hamburguer5.jpg" alt="">
                <h3>Bacon Grill</h3>
                 <figcaption> 150g carne, bacon, queijo, molho e salada</figcaption>
            </figure>
            
            <figure>
                <img src="./img/hamburguer6.jpg" alt="">
                <h3>BBQ Burger</h3>
                <figcaption>150g Carne, bacon, molho BBQ, salada, fritas</figcaption>
            </figure>
            
            <figure>
                <img src="./img/hamburguer7.jpg" alt="">
                <h3>Duplo Smash</h3>
                <figcaption>2x carne 100g, Bacon, cheddar, cebola</figcaption>
            </figure>

            <figure>
                <img src="./img/perfil1.jpg" alt="">
                <h3>Burguer Cheff</h3>
                <figcaption>2x carne 150g, cheddar, cebola caremelizada, tomate, alface </figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>&copy; Menu Burguer Heros - 2026</p>
    </footer>
</body>
</html>
